<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .bonus-card { background: linear-gradient(145deg, #2ecc71, #27ae60); border-radius: 15px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .bonus-info h3 { margin: 0; font-size: 18px; }
        .bonus-info p { margin: 5px 0 0; font-size: 12px; opacity: 0.9; }
        .go-btn { background: white; color: #27ae60; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .header { text-align: center; padding: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
    <div class="header">
        <h2>🔥 AKTİF BONUSLAR</h2>
    </div>

    <div class="bonus-card">
        <div class="bonus-info">
            <h3>500 TL Deneme</h3>
            <p>Çevrimsiz & Yatırımsız</p>
        </div>
        <button class="go-btn" onclick="window.open('https://linkin.com', '_blank')">AL</button>
    </div>

    </body>
</html>
